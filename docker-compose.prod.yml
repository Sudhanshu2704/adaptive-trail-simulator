version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # In production, these should be set via environment variables on the host system (e.g. Render)
      - DATABASE_URL=${DATABASE_URL}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - LLM_PROVIDER=nvidia
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - TZ=Asia/Kolkata
